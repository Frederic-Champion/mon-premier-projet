
<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Titre au hasard !</title>
        <link rel="stylesheet" href="carte.css">
    </head>
    <body>
        <header>
            <h1>Ma mini page de profil !</h1>
        </header>
        <div class="page">
            <section class="carte">
                <img src="https://i.pravatar.cc/150" alt="Photo de profil">
                <h2>Frédéric CHAMPION</h2>
                <p>Opticien Lunetier</p>
                <p>Opticien depuis l'âge de 21ans,<br> je cherche maintenant à me reconvertir en DevFullStack</p>
                <div class="competences">
                    <span class="badge">HTML</span>
                    <span class="badge">CSS</span>
                    <span class="badge">Python</span>
                </div>
            </section>
            <section class="formulaire">
                <form>
                    <label for="prenom">Prénom :</label>
                    <input id="prenom" type="text" placeholder="Ecrit ton prénom">
                    <label for="mail">Email :</label>
                    <input id="mail" type="email" placeholder="tonEmail@mailcom">
                    <label for="message">Message :</label>
                    <textarea id="message" rows="3" placeholder="Ecrit un commentaire :"></textarea>
                    <button type="submit">Envoyer</button>
                </form>
            </section>
        </div>
    </body>
</html>
