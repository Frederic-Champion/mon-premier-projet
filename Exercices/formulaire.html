<!-- Formulaire exercice pour entraintement-->

<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Contactez moi</title>
        <link rel="stylesheet" href="formulaire.css">
    </head>
    <body>
        <header><h1>Contactez moi</h1></header>
        <div class="conteneur"> 
            <form>
                <div class="champ">
                    <label for="prenom">Prénom :</label>
                    <input type="text" id="prenom" placeholder="Ecris ton nom">
                </div>
                <div class="champ">
                    <label for="mail">Email :</label>
                    <input id="mail" type="email" placeholder="tonEmail@mail.com">
                </div>
                <div class="champ">
                    <label for="sujet">Sujet :</label>
                    <input type="text" id="sujet" placeholder="tape ton sujet">
                </div>
                <div class="champ">
                    <label for="message">Message :</label>
                    <textarea id="message" rows="5" placeholder="Ecrit un commentaire"></textarea>
                </div>
                <div class="champ"></div>
                    <button type="submit">Envoyer le message</button>
                </div>
            </form>
        </div> 
    </body>
</html>
