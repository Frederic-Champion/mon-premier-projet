<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>mon exercice grid</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="grid.css">
    </head>
    <body>
        <header>
            <h1>Le tableau des éléments !</h1>
        </header>
        <main>
            <section class="cartes">
                <div class="carte feu">
                    <h3>le feu</h3>
                    <span class="emoji">🔥</span>
                    <p>le feu ça brule</p>
                </div>
                <div class="carte glace">
                    <h3>la glace</h3>
                    <span class="emoji">🧊</span>
                    <p>la glace c'est froid</p>
                </div>
                <div class="carte eau">
                    <h3>l'eau</h3>
                    <span class="emoji">💧</span>
                    <p>l'eau ça mouille</p>
                </div>
                <div class="carte" >
                    <h3>la terre</h3>
                    <span class="emoji">🪨</span>
                    <p>la terre c'est dur</p>
                </div>
                <div class="carte" >
                    <h3>l'air</h3>
                    <span class="emoji">💨</span>
                    <p>le sèche cheveux</p>
                </div>
                <div class="carte" >
                    <h3>la foudre</h3>
                    <span class="emoji">⚡</span>
                    <p>Pikachu attaque éclair</p>
                </div>
                <div class="carte rien">rien</div>
                <div class="carte vide" >
                    <h3>le vide</h3>
                    <span class="emoji">🧠</span>
                    <p>Comme dans un trou noir</p>
            </section>
        </main>
    </body>
</html>
