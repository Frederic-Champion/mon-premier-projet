<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Exercice DOM</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                max-width: 600px;
                margin: 10px auto;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>
            <h1 id="titre">BONJOUR</h1>
        </header>
        <section>
            <p id="description">Chargement ...</p>
            <p id="stock">Stock : 0</p>
            <ul id="liste-montures"></ul>
        </section>
        <script>
            const titre = document.querySelector("#titre");
            const description = document.querySelector("#description");
            const stock = document.querySelector("#stock");

            titre.textContent = "Cabinet Alliance - Tours";
            titre.style.color = "#1a3a5c";
            description.textContent = "Bienvenue dans notre système de gestion";
            stock.textContent = "Stock : 42 montures";

            const montures = ["Ray-Ban", "Oakley", "Persol"];
            const listeMontures = document.querySelector("#liste-montures");
            for (let monture of montures) {
                const liste = document.createElement("li");
                liste.textContent = monture ;
                listeMontures.appendChild(liste);
            }
        </script>
    </body>
</html>
